<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Grid</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #photoGrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(72px, 1fr)); /* Smaller width to fit more images horizontally */
    gap: 5px; /* Reduce spacing between images */
    justify-content: center; /* Center the grid */
    padding: 5px; /* Reduced padding for a tighter fit */
}

img {
    width: 72px;  /* Fixed width */
    height: 128px; /* Fixed height */
    object-fit: cover; /* Ensures no distortion, only cropping */
    border-radius: 10px;
}
    </style>
</head>
<body>

    <div id="photoGrid"></div>

    <!-- Include the JS script here -->
    <script src="grid.js"></script>

</body>
</html>
