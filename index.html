<!DOCTYPE html> 
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eu te amo</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            color: #FFFBD4;
            text-align: center;
            background-color: #090614;
        }

        .slideshow-container {
            width: 350px;
            height: 500px;
            margin: auto;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .slides {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
        }

        .timer {
            font-size: 24px;
            margin-top: 20px;
            color: #FFFBD4;
            background-color: #2D2D2D;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            cursor: pointer;
        }

        .timer-title {
            font-size: 28px;
            font-weight: bold;
            color: #F0F0F0;
            margin-top: 10px;
        }

        h1, h2, h3, h4, h5, h6 {
            margin-bottom: 10px;
        }

        h1 {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Um simples presente</h1>
    <h3>Para a dona do meu coração…</h3>

    <div class="slideshow-container">
        <img class="slides" src="assets/images/IMG1.jpg" alt="Slide 1">
        <img class="slides" src="assets/images/IMG3.jpg" alt="Slide 3">
        <img class="slides" src="assets/images/IMG4.jpg" alt="Slide 4">
        <img class="slides" src="assets/images/IMG5.jpg" alt="Slide 5">
        <img class="slides" src="assets/images/IMG6.jpg" alt="Slide 6">
        <img class="slides" src="assets/images/IMG7.jpg" alt="Slide 7">
        <img class="slides" src="assets/images/IMG8.jpg" alt="Slide 8">
        <img class="slides" src="assets/images/IMG9.jpg" alt="Slide 9">
        <img class="slides" src="assets/images/IMG10.jpg" alt="Slide 10">
        <img class="slides" src="assets/images/IMG11.jpg" alt="Slide 11">
        <img class="slides" src="assets/images/IMG12.jpg" alt="Slide 12">
        <img class="slides" src="assets/images/IMG13.jpg" alt="Slide 13">
        <img class="slides" src="assets/images/IMG14.jpg" alt="Slide 14">
        <img class="slides" src="assets/images/IMG15.jpg" alt="Slide 15">
        <img class="slides" src="assets/images/IMG16.jpg" alt="Slide 16">
    </div>

    <h1>EU TE AMO</h1>
    <h2>EU TE AMO</h2>
    <h3>EU TE AMO</h3>
    <h4>EU TE AMO</h4>
    <h5>EU TE AMO</h5>

    <iframe id="spotifyIframe" style="border-radius:12px" 
        src="https://open.spotify.com/embed/track/43BCxznTSBLcXzu4lJ8KW5?utm_source=generator&theme=0&start=7"
        width="100%" height="152" frameBorder="0" 
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"></iframe>

    <!-- Timer Section -->
    <div id="timer-container">
        <div id="timer-title" class="timer-title">Começamos a namorar</div>
        <div id="timer" class="timer" onclick="cycleTimer()">Click me to change timer</div> <!-- The timer section -->
    </div>

    <script>
        let slideIndex = 0;
        let currentTimer = 0; // 0 - Começamos a namorar, 1 - Começamos a conversar, 2 - Nos conhecemos

        // Timer data in the new order
        const timerData = [
            {
                title: "Começamos a namorar",
                startDate: "January 19, 2025 00:00:00"
            },
            {
                title: "Começamos a conversar",
                startDate: "December 6, 2024 00:00:00"
            },
            {
                title: "Nos conhecemos",
                startDate: "December 13, 2024 00:00:00"
            }
        ];

        // Function to change slides
        function showSlides() {
            let slides = document.getElementsByClassName("slides");
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1; }
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 2000); // Change image every 2 seconds
        }

        // Function to update the timer
        function updateTimer(timerIndex) {
            var startDate = new Date(timerData[timerIndex].startDate).getTime();
            var currentDate = new Date().getTime();
            var timeDiff = currentDate - startDate;

            var days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            var hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            var seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = `${days} dias ${hours} horas ${minutes} minutos ${seconds} segundos`;
            document.getElementById("timer-title").innerHTML = timerData[timerIndex].title;
        }

        // Function to cycle through the timers
        function cycleTimer() {
            currentTimer = (currentTimer + 1) % timerData.length;
            updateTimer(currentTimer);
        }

        // Initial setup
        showSlides();
        updateTimer(0); // Initial timer for "Começamos a namorar"
    </script>

</body>
</html>
