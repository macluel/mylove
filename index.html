<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eu te amo</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            color: #FFFBD4;
            text-align: center;
            background-color: #090614;
        }

        .slideshow-container {
            width: 350px; /* Fixed width */
            height: 500px; /* Fixed height */
            margin: auto;
            text-align: center;
            position: relative; /* Keep images in place */
            overflow: hidden; /* Prevent layout shifting */
        }

        .slides {
            width: 100%; /* Make images fit the container */
            height: 100%; /* Maintain fixed height */
            object-fit: cover; /* Prevents distortion, fills the container */
            position: absolute; /* Stack images on top of each other */
        }

        .timer {
            font-size: 24px;
            margin-top: 20px;
            cursor: pointer; /* Make it clickable */
        }

        .timer-title {
            font-size: 28px;
            font-weight: bold;
            color: #F0F0F0; /* Soft white */
            margin-top: 10px;
            cursor: pointer; /* Make it clickable */
        }

        .easter-egg {
            display: none; /* Initially hide easter egg messages */
            font-size: 18px;
            color: #F0F0F0;
            margin-top: 10px;
            font-style: italic;
        }

        /* Hidden Timer Styles */
        #hiddenTimer {
            font-size: 12px;
            color: #F0F0F0;
            margin-top: 10px;
            display: none; /* Hidden initially */
        }
    </style>
</head>
<body>

    <h1>Um simples presente</h1>
    <h3>Para a dona do meu coração…</h3>

    <div class="slideshow-container">
        <img class="slides" src="assets/images/IMG1.jpg" alt="Slide 1">
        <img class="slides" src="assets/images/IMG3.jpg" alt="Slide 3">
        <img class="slides" src="assets/images/IMG4.jpg" alt="Slide 4">
        <img class="slides" src="assets/images/IMG5.jpg" alt="Slide 5">
        <img class="slides" src="assets/images/IMG6.jpg" alt="Slide 6">
        <img class="slides" src="assets/images/IMG7.jpg" alt="Slide 7">
        <img class="slides" src="assets/images/IMG8.jpg" alt="Slide 8">
        <img class="slides" src="assets/images/IMG9.jpg" alt="Slide 9">
        <img class="slides" src="assets/images/IMG10.jpg" alt="Slide 10">
        <img class="slides" src="assets/images/IMG11.jpg" alt="Slide 11">
        <img class="slides" src="assets/images/IMG12.jpg" alt="Slide 12">
        <img class="slides" src="assets/images/IMG13.jpg" alt="Slide 13">
        <img class="slides" src="assets/images/IMG14.jpg" alt="Slide 14">
        <img class="slides" src="assets/images/IMG15.jpg" alt="Slide 15">
        <img class="slides" src="assets/images/IMG16.jpg" alt="Slide 16">
    </div>

    <h1 id="headerOne">EU TE AMO</h1>
    <h2 id="headerTwo">EU TE AMO</h2>
    <h3 id="headerThree">EU TE AMO</h3>
    <h4 id="headerFour">EU TE AMO</h4>
    <h5 id="headerFive">EU TE AMO</h5>
    <h6 id="headerSix">EU TE AMO</h6>

    <iframe id="spotifyIframe" style="border-radius:12px" 
        src="https://open.spotify.com/embed/track/43BCxznTSBLcXzu4lJ8KW5?utm_source=generator&theme=0&start=7"
        width="100%" height="152" frameBorder="0" 
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"></iframe>

    <div id="timer" class="timer"></div> <!-- The timer section -->
    
    <!-- Hidden easter egg messages -->
    <div id="startTalking" class="easter-egg">Começamos a conversar em: 6 de Dezembro de 2024</div>
    <div id="firstMet" class="easter-egg">Nos conhecemos em: 13 de Dezembro de 2024</div>

    <!-- Hidden timer that will appear when one of the "Eu te amo" headers is clicked -->
    <div id="hiddenTimer">Tempo desde o clique: 0 segundos</div>

    <script>
        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("slides");
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1; }
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 2000); // Change image every 2 seconds
        }

        function shuffleSlides() {
            let container = document.querySelector(".slideshow-container");
            let slides = Array.from(container.children); // Convert to array

            // Fisher-Yates shuffle
            for (let i = slides.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1)); // Random index
                [slides[i], slides[j]] = [slides[j], slides[i]]; // Swap elements
            }

            // Re-add shuffled slides back to the container
            slides.forEach(slide => container.appendChild(slide));
        }

        shuffleSlides();
        showSlides();

        // Function to update the timer
        function updateTimer() {
            // Set the start date (01/19/2025)
            var startDate = new Date("January 19, 2025 00:00:00").getTime();

            // Get the current date and time
            var currentDate = new Date().getTime();

            // Calculate the time difference in milliseconds
            var timeDiff = currentDate - startDate;

            // Calculate the time in days, hours, minutes, and seconds
            var days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            var hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            var seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

            // Display the result
            document.getElementById("timer").innerHTML = "Juntos desde: " + days + " dias " + hours + " horas " + minutes + " minutos " + seconds + " segundos";
        }

        // Update the timer every 1000 milliseconds (1 second)
        setInterval(updateTimer, 1000);

        // Call the function once to show the time immediately
        updateTimer();

        // Autoplay Spotify iframe on page load
        window.onload = function() {
            var iframe = document.getElementById('spotifyIframe');
            iframe.src += "&autoplay=1";  // Add autoplay when the page loads
        }

        // Show the easter egg messages when the timer title is clicked
        document.getElementById("timer").onclick = function() {
            document.getElementById("startTalking").style.display = "block";
            document.getElementById("firstMet").style.display = "block";
        }

        // Hidden timer logic when any "Eu te amo" header is clicked
        let headerElements = document.querySelectorAll('h1, h2, h3, h4, h5, h6');
        headerElements.forEach(header => {
            header.addEventListener('click', function() {
                document.getElementById("hiddenTimer").style.display = "block"; // Show the hidden timer
                let startTime = Date.now(); // Get the time when clicked

                // Update the hidden timer every second
                setInterval(function() {
                    let elapsedTime = Math.floor((Date.now() - startTime) / 1000);
                    document.getElementById("hiddenTimer").innerHTML = "Tempo desde o clique: " + elapsedTime + " segundos";
                }, 1000);
            });
        });
    </script>

</body>
</html>
