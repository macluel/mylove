    <h1>Um simples presente</h1>

    <div class="slideshow-container">

    </div>
    
    <script>
        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("slides");
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1; }
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 2000); // Change image every 10 seconds
        }
        function shuffleSlides() {
    let container = document.querySelector(".slideshow-container");
    let slides = Array.from(container.children); // Convert to array
    
    // Fisher-Yates shuffle
    for (let i = slides.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1)); // Random index
        [slides[i], slides[j]] = [slides[j], slides[i]]; // Swap elements
    }

    // Re-add shuffled slides back to the container
    slides.forEach(slide => container.appendChild(slide));
}
        shuffleSlides();
        showSlides();
    </script>
    
    <style>
    .slideshow-container {
    width: 350px; /* Fixed width */
    height: 500px; /* Fixed height */
    margin: auto;
    text-align: center;
    position: relative; /* Keep images in place */
    overflow: hidden; /* Prevent layout shifting */
}

.slides {
    width: 100%; /* Make images fit the container */
    height: 100%; /* Maintain fixed height */
    object-fit: cover; /* Prevents distortion, fills the container */
    position: absolute; /* Stack images on top of each other */
}

    </style>
