<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eu te amo</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            color: #FFFBD4;
            text-align: center;
            background-color: #090614;
        }

        .slideshow-container {
            width: 100%;
            height: 100%;
            max-width: 350px;
            aspect-ratio: 7/10;
            margin: auto;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .slides {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            transition: opacity 1s ease-in-out;
        }

        .timer {
            font-size: 30px;
            color: #FFFBD4;
            background-color: transparent;
            padding: 10px;
            border-radius: 5px;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.2s ease-in-out;
        }

        .timer:hover {
            transform: scale(1.1);
        }

        .timer-title {
            font-size: 20px;
            color: #F0F0F0;
            margin-top: 10px;
            font-weight: bold;
        }

        .playlist-container {
            margin-top: 20px;
        }

        .spotify-embed {
            width: 100%;
            max-width: 350px;
            height: 80px;
            border: none;
            background-color: #1c1c1c;
            filter: invert(0.9) hue-rotate(180deg);
            border-radius: 12px;
        }

        h1, h2, h3, h4, h5, h6 {
            margin-bottom: 10px;
        }

        h1 {
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .slideshow-container {
                width: 90%;
                height: auto;
            }
            .timer {
                font-size: 24px;
                padding: 8px;
            }
            .timer-title {
                font-size: 18px;
            }
            h1 {
                font-size: 24px;
            }
            h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <h1>Um simples presente</h1>
    <h3>Para a dona do meu coração…</h3>

    <div class="slideshow-container">
        <img class="slides" src="assets/images/IMG1.jpg" alt="Slide 1">
        <img class="slides" src="assets/images/IMG2.jpg" alt="Slide 2">
        <img class="slides" src="assets/images/IMG3.jpg" alt="Slide 3">
        <img class="slides" src="assets/images/IMG4.jpg" alt="Slide 4">
        <img class="slides" src="assets/images/IMG5.jpg" alt="Slide 5">
        <img class="slides" src="assets/images/IMG6.jpg" alt="Slide 6">
        <img class="slides" src="assets/images/IMG7.jpg" alt="Slide 7">
        <img class="slides" src="assets/images/IMG8.jpg" alt="Slide 8">
        <img class="slides" src="assets/images/IMG9.jpg" alt="Slide 9">
        <img class="slides" src="assets/images/IMG10.jpg" alt="Slide 10">
        <img class="slides" src="assets/images/IMG11.jpg" alt="Slide 11">
        <img class="slides" src="assets/images/IMG12.jpg" alt="Slide 12">
        <img class="slides" src="assets/images/IMG13.jpg" alt="Slide 13">
        <img class="slides" src="assets/images/IMG14.jpg" alt="Slide 14">
        <img class="slides" src="assets/images/IMG15.jpg" alt="Slide 15">
        <img class="slides" src="assets/images/IMG16.jpg" alt="Slide 16">
    </div>

    <h1>EU TE AMO</h1>
    <h2>EU TE AMO</h2>
    <h3>EU TE AMO</h3>
    <h4>EU TE AMO</h4>
    <h5>EU TE AMO</h5>

    <div class="playlist-container">
        <iframe class="spotify-embed" src="https://open.spotify.com/embed/playlist/5qEOCUhoWS6S2JNHb7M5Zd?utm_source=generator" loading="lazy"></iframe>
    </div>

    <div id="timer-container">
        <div id="timer-title" class="timer-title">Quando começamos a namorar…</div>
        <div id="timer" class="timer" onclick="cycleTimer()">Click me to change timer</div>
    </div>
</body>
</html>
